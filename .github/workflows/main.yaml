name: My First CI Pipeline

# 1. When should this run?
on:
  push:
    branches: [ master ]  # Run every time you push to main
  pull_request:
    branches: [ master ]  # Run when someone wants to merge into main

# 2. What should it do?
jobs:
  build-and-test:
    runs-on: ubuntu-latest # The cloud computer provided by GitHub

    steps:
      - name: Get my code
        uses: actions/checkout@v4 # Copies your code to the cloud PC

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run my tests
        run: npm test # This runs your test.js file
